<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-box" id="form-box">
            <h1>User Feedback Form</h1>
            <p>Fill out the form below and submit your feedback.</p>

            <form id="feedback-form">
                <label for="user-name">Name</label>
                <input type="text" id="user-name" placeholder="Enter your name">
                <div class="tooltip" id="name-tooltip">Type your full name here.</div>
                <div class="message" id="name-message"></div>

                <label for="user-email">Email</label>
                <input type="email" id="user-email" placeholder="Enter your email">
                <div class="tooltip" id="email-tooltip">Type a valid email address here.</div>
                <div class="message" id="email-message"></div>

                <label for="user-comments">Comments</label>
                <textarea id="user-comments" rows="5" placeholder="Write your comments here"></textarea>
                <div class="tooltip" id="comments-tooltip">Type your feedback here.</div>
                <div class="message" id="comments-message"></div>

                <p id="char-count">Character count: 0</p>

                <button type="submit">Submit</button>
            </form>
        </div>

        <div class="feedback-box">
            <h2>Feedback Display</h2>
            <div id="feedback-display"></div>
        </div>
    </div>

    <script src="cp_1.js"></script>
</body>
</html>
